services:
  - type: web
    name: fzac-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: crud-images
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: ADMIN_EMAILS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JSON_LIMIT
        value: 2mb
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: ADMIN_RATE_LIMIT_MAX
        value: "120"
