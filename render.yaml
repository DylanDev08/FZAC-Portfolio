services:
  - type: web
    name: FZAC-Portfolio
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: crud-images
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
      - key: ADMIN_EMAILS
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: FZAC-Portfolio-1
          envVarKey: RENDER_EXTERNAL_URL
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: FZAC-Portfolio-1
          envVarKey: RENDER_EXTERNAL_URL
      - key: JSON_LIMIT
        value: 2mb
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: ADMIN_RATE_LIMIT_MAX
        value: "120"

  - type: web
    name: FZAC-Portfolio-1
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_ORIGIN
        fromService:
          type: web
          name: FZAC-Portfolio
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SUPABASE_URL
        fromService:
          type: web
          name: FZAC-Portfolio
          envVarKey: SUPABASE_URL
      - key: VITE_SUPABASE_ANON_KEY
        fromService:
          type: web
          name: FZAC-Portfolio
          envVarKey: SUPABASE_ANON_KEY
      - key: VITE_SUPABASE_STORAGE_BUCKET
        value: crud-images
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: http://localhost:* ws://localhost:*; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      - type: redirect
        source: /obra/sliders-jujuy
        destination: /obra/sliders-hamburger
      - type: redirect
        source: /obra/sliders-rosas
        destination: /obra/sliders-hamburger
      - type: redirect
        source: /obra/sliders-funes
        destination: /obra/sliders-hamburger
      - type: redirect
        source: /obra/amstrong
        destination: /obra/armstrong
      - type: redirect
        source: /obra/fichines-pichincha
        destination: /obra/fichines
      - type: redirect
        source: /obra/local-flama
        destination: /obra/flama
      - type: redirect
        source: /obra/flama-local
        destination: /obra/flama
      - type: rewrite
        source: /*
        destination: /index.html
